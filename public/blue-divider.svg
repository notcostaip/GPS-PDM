<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="4">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050a12" />
      <stop offset="25%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="75%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#050a12" />
    </linearGradient>
    <pattern id="pattern" width="200%" height="4" patternUnits="userSpaceOnUse">
      <rect width="200%" height="4" fill="url(#grad)">
        <animate attributeName="x" from="0" to="-100%" dur="2s" repeatCount="indefinite" />
      </rect>
    </pattern>
  </defs>
  <rect width="100%" height="4" fill="url(#pattern)" />
</svg>
